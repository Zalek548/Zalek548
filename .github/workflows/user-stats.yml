name: Generate Profile Statistics

on:
  schedule:
    - cron: "17 2 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-statistics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate statistics SVG
        uses: cicirello/user-statistician@v1
        with:
          image-file: images/userstats.svg
          colors: dark
          custom-title: "ZALEK // SIGNATURE 548"
          hide-keys: "contribs"
          max-languages: 8

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images/userstats.svg
          git commit -m "Update profile statistics" || exit 0
          git push
